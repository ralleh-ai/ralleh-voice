name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: .venv/bin/python -m pytest -q

      - name: Compile check
        run: python -m compileall ralleh_voice tests

      - name: Diff whitespace check
        run: git diff --check
